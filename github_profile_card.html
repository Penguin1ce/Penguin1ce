<div style="max-width: 640px; margin: 0 auto; padding: 1.5rem 0;">
  <div
    style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; display: flex; gap: 1.25rem; align-items: flex-start;">
    <img src="https://muzimi.org/img/index/sticker.webp" alt="sticker"
      style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 0.5px solid var(--color-border-tertiary); flex-shrink: 0;"
      onerror="this.style.display='none'" />
    <div style="flex: 1; min-width: 0;">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
        <span style="font-size: 18px; font-weight: 500; color: var(--color-text-primary);">Penguin1ce</span>
        <span
          style="font-size: 12px; background: var(--color-background-info); color: var(--color-text-info); padding: 2px 10px; border-radius: var(--border-radius-md);">Backend
          Dev</span>
      </div>
      <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 12px;">Go / Agent / iOS Development ·
        CQU · Apple Fans</p>
      <div style="display: flex; flex-wrap: wrap; gap: 8px;">
        <span
          style="font-size: 12px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 3px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary);">Go</span>
        <span
          style="font-size: 12px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 3px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary);">Agent</span>
        <span
          style="font-size: 12px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 3px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary);">iOS</span>
        <span
          style="font-size: 12px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 3px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary);">Apple</span>
      </div>
    </div>
  </div>
</div>
